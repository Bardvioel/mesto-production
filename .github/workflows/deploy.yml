name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Установка зависимостей
        run: |
          # Простая установка (создаст package-lock.json если его нет)
          npm install

      - name: Сборка проекта
        run: |
          # Собираем проект
          npm run build
          
          # Проверяем результат
          echo "📁 Содержимое после сборки:"
          ls -la
          echo ""
          echo "📦 Содержимое папки dist:"
          ls -la dist/

      - name: Деплой на GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true   # Для чистого деплоя
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
